<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #172b4d; padding: 12px; }
    label { font-size: 12px; font-weight: 600; color: #5e6c84; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; outline: none; margin-bottom: 12px; }
    input:focus { border-color: #0079bf; }
    input[type="number"] { width: 100%; }
    .submit-btn { width: 100%; padding: 10px; background: #0079bf; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .submit-btn:hover { background: #026aa7; }
  </style>
</head>
<body>
  <label for="discipline">Discipline</label>
  <input type="text" id="discipline" placeholder="e.g. Art, Technical, Audio...">
  <label for="points">Story Points</label>
  <input type="number" id="points" placeholder="0" min="0">
  <button class="submit-btn" id="submit">Add Points</button>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();

    document.getElementById('submit').addEventListener('click', function() {
      var disc = document.getElementById('discipline').value.trim();
      var pts = parseInt(document.getElementById('points').value, 10);
      if (!disc || isNaN(pts) || pts < 0) return;

      t.card('id').then(function(card) {
        t.get(card.id, 'shared', 'storyPoints').then(function(data) {
          data = data || { entries: [] };
          data.entries.push({ discipline: disc, points: pts });
          return t.set(card.id, 'shared', 'storyPoints', data);
        }).then(function() {
          t.alert({ message: disc + ': ' + pts + ' pts added.', duration: 3 });
          t.closePopup();
        });
      });
    });

    // Enter key submits
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('submit').click();
    });
  </script>
</body>
</html>
