<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
  <div id="app">
    <input type="text" id="search" placeholder="Search cards..." />
    <div id="card-list"></div>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();

    function renderCards(cards, currentId, existingChildren) {
      var list = document.getElementById('card-list');
      var search = document.getElementById('search');

      function render(filter) {
        list.innerHTML = '';
        var filtered = cards.filter(function(c) {
          if (c.id === currentId) return false;
          if (existingChildren.indexOf(c.id) > -1) return false;
          if (!filter) return true;
          return c.name.toLowerCase().indexOf(filter.toLowerCase()) > -1;
        });

        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty">No available cards found.</div>';
          return;
        }

        filtered.forEach(function(card) {
          var div = document.createElement('div');
          div.className = 'card-row';
          div.textContent = card.name;
          div.addEventListener('click', function() {
            // Get current card's nesting data
            t.get(currentId, 'shared', 'nesting').then(function(data) {
              data = data || {};
              var children = data.childIds || [];
              if (children.indexOf(card.id) === -1) {
                children.push(card.id);
              }
              data.childIds = children;
              data.isParent = true;
              return t.set(currentId, 'shared', 'nesting', data);
            }).then(function() {
              // Set child's parent reference
              return t.get(card.id, 'shared', 'nesting').then(function(childData) {
                childData = childData || {};
                childData.parentId = currentId;
                childData.isChild = true;
                return t.set(card.id, 'shared', 'nesting', childData);
              });
            }).then(function() {
              t.alert({ message: '"' + card.name + '" added as child.', duration: 3 });
              existingChildren.push(card.id);
              render(search.value);
            });
          });
          list.appendChild(div);
        });
      }

      search.addEventListener('input', function() {
        render(this.value);
      });

      render('');
    }

    t.card('id').then(function(card) {
      var currentId = card.id;

      Promise.all([
        t.cards('id', 'name'),
        t.get(currentId, 'shared', 'nesting')
      ]).then(function(results) {
        var cards = results[0];
        var data = results[1] || {};
        var existingChildren = data.childIds || [];
        renderCards(cards, currentId, existingChildren);
      });
    });
  </script>
</body>
</html>
